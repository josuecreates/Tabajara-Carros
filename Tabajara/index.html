<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabajara Carros - Entrar</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="login-card">
    <div class="logo">
      <i class="fas fa-car-side"></i>
    </div>
    <h1 class="title">Tabajara Carros</h1>
    <p class="subtitle">Aluguel inteligente</p>

    <form id="loginForm" novalidate>
      <div class="input-group">
        <input type="text" id="loginEmail" class="input-field" placeholder="E-mail ou CPF" autofocus required>
      </div>

      <div class="input-group">
        <input type="password" id="loginPassword" class="input-field" placeholder="Senha" required>
        <button type="button" class="toggle-password" id="togglePassword">
          <i class="fas fa-eye"></i>
        </button>
      </div>

      <div class="form-options">
        <label class="checkbox-container">
          <input type="checkbox" id="rememberCheck">
          <span>Manter conectado</span>
        </label>
        <a href="#" class="forgot" id="forgotPassword">Esqueci a senha</a>
      </div>

      <button type="submit" class="btn-entrar" id="loginBtn">ENTRAR</button>
    </form>
  </div>

  <script src="script.js"></script>
</body>

</html>
